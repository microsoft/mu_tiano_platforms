name: Hafnium and Trusted Firmware-A Build

on:
  release:
    types:
      - published
  pull_request:
    branches:
      - '**'  # Matches all branches
    paths:
      - 'Platforms/QemuArmVirtPkg/**'
      - 'Silicon/Arm/**'
  workflow_dispatch:

jobs:
  build:
    name: Hafnium and Trusted Firmware-A Build
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/microsoft/mu_devops/ubuntu-24-dev:latest

    steps:
      - name: Generate Token
        if: github.event_name == 'release'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.MU_ACCESS_APP_ID }}
          private-key: ${{ secrets.MU_ACCESS_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install Pip Modules
        run: |
          python -m pip install --upgrade pip
          pip install -r pip-requirements.txt

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Redirect Submodule URLs
        run: |
          git config --global url."https://github.com/TF-Hafnium/hafnium-prebuilts".insteadOf "https://git.trustedfirmware.org/hafnium/prebuilts"
          git config --global url."https://github.com/TF-Hafnium/hafnium-project-reference".insteadOf "https://git.trustedfirmware.org/hafnium/project/reference"
          git config --global url."https://github.com/TF-Hafnium/hafnium-third_party-dtc".insteadOf "https://git.trustedfirmware.org/hafnium/third_party/dtc"
          git config --global url."https://github.com/TF-Hafnium/hafnium-third_party-googletest".insteadOf "https://git.trustedfirmware.org/hafnium/third_party/googletest"

      - name: Stuart Setup
        run: python Platforms/QemuArmVirtPkg/PlatformBuild.py --setup

      - name: Stuart Update
        run: python Platforms/QemuArmVirtPkg/PlatformBuild.py --update

      - name: Stuart Build (DEF)
        run: python Platforms/QemuArmVirtPkg/PlatformBuild.py --clean HAF_TFA_BUILD=TRUE BLD_*_TPM2_ENABLE=FALSE

      - name: Stage DEF HAF/TF-A binaries
        if: github.event_name == 'release'
        run: |
          mkdir -p "${RUNNER_TEMP}/haf-tfa-firmware/DEF"
          cp -a Build/QemuArmVirtPkg/DEBUG_GCC5/HafTfaBins/. "${RUNNER_TEMP}/haf-tfa-firmware/DEF"/
          ls "${RUNNER_TEMP}/haf-tfa-firmware/DEF"

      - name: Stuart Build (TPM)
        run: python Platforms/QemuArmVirtPkg/PlatformBuild.py --clean HAF_TFA_BUILD=TRUE BLD_*_TPM2_ENABLE=TRUE

      - name: Stage TPM HAF/TF-A binaries
        if: github.event_name == 'release'
        run: |
          mkdir -p "${RUNNER_TEMP}/haf-tfa-firmware/TPM"
          cp -a Build/QemuArmVirtPkg/DEBUG_GCC5/HafTfaBins/. "${RUNNER_TEMP}/haf-tfa-firmware/TPM"/
          ls "${RUNNER_TEMP}/haf-tfa-firmware/TPM"

      - name: Install archive tools
        if: github.event_name == 'release'
        run: |
          apt-get update -y
          apt-get install -y zip tar gh

      - name: Create combined archives
        if: github.event_name == 'release'
        run: |
          ZIP_PATH="${RUNNER_TEMP}/haf-tfa-firmware-${{ github.event.release.tag_name }}.zip"
          TAR_PATH="${RUNNER_TEMP}/haf-tfa-firmware-${{ github.event.release.tag_name }}.tar.gz"
          (cd "${RUNNER_TEMP}/haf-tfa-firmware" && zip -r "$ZIP_PATH" DEF TPM)
          (cd "${RUNNER_TEMP}/haf-tfa-firmware" && tar -czf "$TAR_PATH" DEF TPM)
          ls -lh "$ZIP_PATH" "$TAR_PATH"

      - name: Upload Release Assets
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "${RUNNER_TEMP}"/*.zip
          gh release upload "${{ github.event.release.tag_name }}" "${RUNNER_TEMP}"/*.tar.gz
